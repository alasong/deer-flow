# channel-rules.yaml — 通道规则单一事实来源（PDF v2）
# lite/standard/full/analysis/planning 五通道的完整定义：跳过步骤 + 模型 + 审查/对抗
# 版本: 2.2
---
channels:
  lite:
    description: "最小模式 — 简单 bugfix/配置修改，最小 Check+Act"
    plan_omit:
      - P-0.5
      - P-0.25
      - P0.5
      - P0.55
      - P0.7
      - P2
      - P3
      - P3.5
    do:
      reviewer: skip
      reviewer_model: null
    check:
      enabled: true
      model: haiku
      reviewer_model: null          # No reviewer for lite Check
      adversary:
        enabled: false
    act:
      enabled: true
      actor_model: haiku
      reviewer_model: null          # No reviewer for lite Act
    repair_gate_profile: lite
    made_profile: lite
    n_check: 1
    topology: single_agent
    context_bundle: full
    topology_config:
      model: sonnet
      do_n: 1
      do_m: 0

  analysis:
    description: "纯分析/研究/审计模式 — 零 P0 前置节点，全 llm_converge，auto-approve"
    plan_omit:
      - P-0.5..P0.7       # 全部 P0 前置节点
      - P2                # 无 spawn review（analysis 用 llm_converge 自审）
      - P3.5
    do:
      reviewer: skip
      reviewer_model: null
    check:
      enabled: true
      model: sonnet
      reviewer_model: null
      adversary:
        enabled: false
    act:
      enabled: true
      actor_model: sonnet
      reviewer_model: null
    repair_gate_profile: lite
    made_profile: lite
    n_check: 1
    topology: single_agent
    context_bundle: minimal
    topology_config:
      model: sonnet
      do_n: 1
      do_m: 0

  planning:
    description: >
      规划模式 — 项目需求到迭代规划。全 llm_converge，无 P0 前置，
      P2 架构多方案，用户确认 checkpoint，Check 五路路由。
    plan_omit: []
    do:
      reviewer: skip
      reviewer_model: null
    check:
      enabled: true
      model: sonnet
      reviewer_model: null
      adversary:
        enabled: false
    act:
      enabled: true
      actor_model: sonnet
      reviewer_model: null
    repair_gate_profile: standard
    made_profile: lite
    n_check: 1
    topology: single_agent
    context_bundle: minimal
    topology_config:
      model: sonnet
      do_n: 1
      do_m: 0

  standard:
    description: "标准模式 — 功能/配置/文档修改，有基本审查"
    plan_omit:
      - P-0.25
      - P0.5
      - P3
      - P3.5
    plan_review:
      conditional: true
      trigger_on: [security_audit, compliance, data_integrity]
      trigger_dims: [security, data_privacy]
      trigger_kind: [refactor, architecture]
      trigger_multi_module: true
      dimensions: [correctness]
    do:
      reviewer: conditional
      reviewer_model:
        correctness: sonnet
        security: sonnet
        default: haiku
      upgrade:
        trigger_m: 5
        to: opus
    check:
      enabled: true
      model: haiku
      reviewer_model: haiku
      adversary:
        enabled: true               # Conditional: M>=2 activates adversary
        trigger_m: 2
        model: haiku
        upgrade_m: 5
        upgrade_to: sonnet
    act:
      enabled: true
      actor_model: haiku
      reviewer_model: haiku
      upgrade:
        trigger_m: 5
        to: opus
    repair_gate_profile: standard
    made_profile: standard_lite
    topology: single_agent
    coalesce_threshold: 3
    context_bundle: full
    n_check: {base: 1, per_doer: 0.5, min: 2, max: 2}

  full:
    description: "完整模式 — 重构/安全/大规模修改，全流程审查+对抗"
    plan_omit: []
    do:
      reviewer: full
      reviewer_model:
        correctness: sonnet
        security: sonnet
        default: haiku
      upgrade:
        trigger_m: 5
        to: opus
    check:
      enabled: true
      model: sonnet
      reviewer_model: sonnet
      adversary:
        enabled: true
        trigger_m: 3
        model: sonnet
        upgrade_m: 5
        upgrade_to: opus
    act:
      enabled: true
      actor_model: sonnet
      reviewer_model: sonnet
      upgrade:
        trigger_m: 5
        to: opus
    repair_gate_profile: full
    made_profile: full
    topology: multi_agent
    context_bundle: true
    # NOTE: value is in chars, not tokens. Chinese ~4:1, code ~1:1 for token estimation.
    context_bundle_max_tokens: 12000
    n_check: {base: 1, per_doer: 1, max: 3}

# Repair gate profiles
repair_gate_profiles:
  lite:
    max_plan_loop: 0
    max_do_loop: 1
    flaky_retry_max: 0
    degrade_on_exceed: record_and_proceed
  standard:
    max_plan_loop: 2
    max_do_loop: 2
    flaky_retry_max: 3
    degrade_on_exceed: record_and_proceed
  full:
    max_plan_loop: 2
    max_do_loop: 3
    flaky_retry_max: 3
    degrade_on_exceed: pause_and_ask

# MADE profiles
made_profiles:
  lite:
    trigger_depth: 3
    n_explorers_min: 2
    n_explorers_max: 2
    max_parallel: 1
    max_concurrent_explorations: 2
    fallback_on_failure: skip
  standard_lite:
    description: "最小 MADE — 用于 standard 通道"
    trigger_depth: 2
    n_explorers_min: 1
    n_explorers_max: 2
    max_parallel: 1
    max_concurrent_explorations: 2
    fallback_on_failure: skip
  standard:
    trigger_depth: 2
    n_explorers_min: 2
    n_explorers_max: 3
    max_parallel: 2
    max_concurrent_explorations: 3
    fallback_on_failure: skip
  full:
    trigger_depth: 2
    n_explorers_min: 2
    n_explorers_max: 4
    max_parallel: 2
    max_concurrent_explorations: 6
    fallback_on_failure: internal_analysis

# Gate profiles
gate_profiles:
  lite:
    precheck: skip
    sanitize: skip
    scope_classify: default
    adr_validate: skip
    decisions_merge: skip
    design_check: skip
    review_precheck: skip
    exit_check: auto_pass
  standard:
    precheck: fast_only
    sanitize: dry_run
    scope_classify: default
    adr_validate: skip
    decisions_merge: skip
    design_check: skip
    review_precheck: skip
    exit_check: list_only
  full:
    precheck: full
    sanitize: full
    scope_classify: full
    adr_validate: strict
    decisions_merge: full
    design_check: full
    review_precheck: full
    exit_check: list_only

# Forgery detection config (PDF v4.10)
forgery_detection:
  enabled: true
  min_threshold_seconds: 2.0
  anomaly_ratio: 0.1
  history_lookback_days: 90
