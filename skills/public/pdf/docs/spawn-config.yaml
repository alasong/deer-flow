# spawn-config.yaml — PDF spawn strategy + model tier configuration (v2)
# Referenced from SKILL.md and pdf-engine.py. Single source of truth.
#
# spawn:       per-stage spawn strategy (roles, models, parallel)
# model_tier:  model tier defaults, domain overrides, and runtime override mechanism
# arbitration: arbitrator model per stage
# timeout:     spawn timeout config

spawn:
  plan:
    # DEPRECATED: use model_tier.default (resolved by pdf-engine.py config get-model)
    analysis_model: sonnet
    analysis_subagent_type: general-purpose
    analysis_roles: [analyst-external, analyst-internal]  # N=2; N=1 uses analyst-general
    # DEPRECATED: use model_tier.default.plan.design (sonnet)
    design_model: sonnet
    design_subagent_type: general-purpose
    design_roles: [designer-structure, designer-behavior]
    p2_model: sonnet
    p2_subagent_type: general-purpose
    p2_5_model: sonnet
    p2_5_subagent_type: general-purpose
    p2_5_role: narrative-editor
    p2_roles_template: "plan-reviewer-<维度>"
    parallel: true

  do:
    # DEPRECATED: use model_tier.default.do.p1 (sonnet)
    p1_model: sonnet
    p1_subagent_type: general-purpose
    p2_model: sonnet
    p2_subagent_type: general-purpose
    p1_roles: ["doer-N"]  # N is number, e.g. doer-1, doer-2
    p2_roles_template: "reviewer-<维度>"
    parallel: true

  check:
    p1_model: sonnet
    p1_subagent_type: general-purpose
    p2_model: sonnet
    p2_subagent_type: general-purpose
    p1_roles: ["checker-N"]
    # N resolved dynamically from state.stages.check.resolved_n_check (PDF v4.10)
    p2_roles_template: "check-reviewer-<维度>"
    parallel: true

  act:
    p1_model: sonnet
    p1_subagent_type: general-purpose
    p2_model: sonnet
    p2_subagent_type: general-purpose
    p1_roles: ["actor-N"]
    p2_roles_template: "act-reviewer-<维度>"
    parallel: true

# Model upgrade rules for high-risk cycles
# When M >= 3: correctness and security reviewers upgrade from sonnet to opus
model_upgrade:
  dimensions:
    correctness:    {trigger_m: 2, upgrade_to: opus}
    security:       {trigger_m: 2, upgrade_to: opus}
    api_design:     {trigger_m: 3, upgrade_to: opus}
    performance:    {trigger_m: 3, upgrade_to: opus}
    test_quality:   {trigger_m: 4, upgrade_to: opus}
    maintainability: {trigger_m: 4, upgrade_to: opus}
    reliability:    {trigger_m: 3, upgrade_to: opus}
    data_privacy:   {trigger_m: 2, upgrade_to: opus}

# Arbitrator model by stage
arbitration:
  plan: sonnet
  do: opus
  check: opus
  act: opus

# Timeout fallback
timeout:
  bg_unavailable_fallback: fg
  fallback_estimate_seconds: 13-23

# Merge-Synthesizer config for Merge-Then-Review pattern
merge_synthesizer:
  model: opus
  subagent_type: general-purpose
  role: merge-synthesizer
  context_bundle: true
  conflict_strategy: preserve_critical

# Learning config for Cycle-History adaptive model selection
learning:
  min_cycles_for_warm: 3         # Minimum cycles before history-based recommendation activates
  effectiveness_decay: 0.7        # Older cycles weighted less than newer ones
  default_effectiveness: 0.5      # Default score for cycles without explicit rating
  max_history_days: 90            # Lookback window for history queries
  exploration:
    cold_start_rate: 0.6          # No history: 60% exploration (PDF v5.2)
    warm_rate: 0.35               # 3-10 cycles: 35% exploration (PDF v5.2)
    mature_rate: 0.25             # >10 cycles: 25% exploration (PDF v5.2)
    history_thresholds:
      cold_max: 3                 # 0-3 cycles = cold start
      warm_max: 10                # 4-10 cycles = warm; >10 = mature

# === v2: Model tier configuration ===
# config get-model reads from defaults, then applies domain overrides, then CLI overrides.
# Override priority: CLI --model-tier > domain model_tier_overrides > domain_model_defaults > model_tier.default
model_tier:
  default:
    plan:
      analysis: sonnet
      design: sonnet
      p2: sonnet
      upgrade: {trigger_m: 5, to: opus}
    do:
      p1: sonnet
      p2:
        correctness: sonnet
        security: sonnet
        default: sonnet
      upgrade: {trigger_m: 5, to: opus}
    check:
      p1: sonnet
      p2: sonnet
      upgrade: {trigger_m: 3, to: opus}
    act:
      p1: sonnet
      p2: sonnet
      upgrade: {trigger_m: 5, to: opus}
  overrides:
    # Domain-level model overrides (P1-a feature, to be populated per domain)
    # Example:
    # security:
    #   do.p1: sonnet
    #   check.p2: opus
    {}

# Domain-level model tier defaults (P1-b feature)
# Applied AFTER model_tier.default but BEFORE domain model_tier_overrides
domain_model_defaults:
  general:
    do: {p1: sonnet, p2: {default: sonnet, correctness: sonnet, security: sonnet}}
    check: {p1: sonnet, p2: sonnet}
  security:
    do: {p1: sonnet, p2: {default: sonnet}}
    plan: {analysis: sonnet}
  api_design:
    plan: {analysis: sonnet}
    do: {p2: {default: haiku, api_design: sonnet, correctness: sonnet}}
  performance:
    do: {p1: sonnet}
    check: {p2: sonnet}
  data_engineering:
    do: {p1: sonnet, p2: {correctness: sonnet}}
  frontend:
    plan: {design: sonnet}
  devops:
    do: {p1: haiku}

# Single-agent topology config
single_agent:
  model: sonnet
  context_bundle: true
  role: implementer
  do:
    N: 1
    M: 0
