# PDF 强引擎蓝图 — FULL 模式（默认）
#
# 全量多 Agent 拓扑：N 实现者 + M 审查者 + 修复门 + 对抗审查
# llm_spawn 节点必须 spawn 子 Agent（N/M 由 plan 动态计算）
# manual_checkpoint 节点是关键的 Plan→Do 决策屏障
# 所有 transition 有 max_loops，超限后 HSM pause → 人工介入
#
# 适用：重构/安全/大规模修改/跨模块任务

name: "PDF Full Blueprint"
version: "2.0.0"
channel: full

stages:
  # ================================================================
  # Plan — 方案设计 + M 维度审查 + 对抗
  # ================================================================
  plan:
    entry_gate:
      artifacts: []
      on_fail: block

    nodes:
      - ref: P0_precheck
        type: engine_exec
        command: pdf-engine.py precheck run
        deps: []
        retry: 2
        description: "前置检查（引擎预检）"

      - ref: P0_sanitize
        type: engine_exec
        command: pdf-engine.py sanitize run
        deps: [P0_precheck]
        retry: 2
        description: "输入清洗（对抗偏置词）"

      - ref: P0_scope
        type: engine_exec
        command: pdf-engine.py scope classify
        deps: [P0_sanitize]
        retry: 2
        description: "上下文范围检测（基于清洗后输入）"

      - ref: P0_kb
        type: engine_exec
        command: pdf-engine.py knowledge seed
        deps: [P0_scope]
        retry: 2
        description: "知识库/技术栈注入"

      - ref: P0_archive
        type: engine_exec
        command: pdf-engine.py archive context-inject
        deps: [P0_scope]
        retry: 2
        description: "历史 archive 注入"

      - ref: P0_tskb
        type: engine_exec
        command: pdf-engine.py knowledge search
        deps: [P0_scope]
        retry: 2
        description: "技术栈知识语义检索"

      - ref: P0_intel
        type: engine_exec
        command: pdf-engine.py intel inject
        deps: [P0_scope, P0_tskb]
        retry: 2
        description: "情报注入（含 WebSearch）"

      - ref: P0_factor
        type: engine_exec
        command: pdf-engine.py factor analyze
        deps: [P0_scope, P0_tskb, P0_intel]
        retry: 2
        description: "因子分析（PFF 风格）"

      - ref: P0_meta_review
        type: engine_exec
        command: pdf-engine.py meta review
        deps: [P0_factor]
        retry: 2
        description: "meta-review 框架偏误审计"

      - ref: P0_made
        type: llm_spawn
        spawn_role: made_explorer
        deps: [P0_scope, P0_kb, P0_intel, P0_tskb]
        retry: 3
        artifacts: [synthesized_findings.md]
        description: "MADE 发散探索 — spawn N explorers + 1 synthesizer"

      - ref: P0_analysis
        type: llm_spawn
        spawn_role: analyst
        deps: [P0_made]
        retry: 3
        artifacts: [analysis.md]
        description: "Analysis 子阶段 — spawn N analysts"

      - ref: P1_design
        type: llm_spawn
        spawn_role: designer
        deps: [P0_analysis, P0_meta_review, P0_archive]
        retry: 3
        artifacts: [plan_decisions.yaml]
        description: "方案设计 — spawn N designer"

      - ref: P1_merge_engine
        type: engine_exec
        command: pdf-engine.py decisions merge
        deps: [P1_design]
        retry: 2
        description: "引擎 frontmatter 合并"

      - ref: P1_density
        type: engine_exec
        command: pdf-engine.py density-check
        deps: [P1_merge_engine]
        retry: 2
        description: "信息密度检查"

      - ref: P2_review
        type: llm_spawn
        spawn_role: planner_reviewer
        deps: [P1_density]
        retry: 3
        artifacts: [plan_review_*.md]
        description: "审查 — spawn M reviewer（每个维度 1 人）；M≥3 时额外 spawn adversarial reviewer"

      - ref: P2_adversary
        type: llm_spawn
        spawn_role: planner_adversary
        deps: [P1_density]
        retry: 3
        artifacts: [adversary_report.md]
        description: "对抗审查 — 标注设计假设风险"

      - ref: P3_converge
        type: llm_converge
        deps: [P2_review, P2_adversary]
        retry: 3
        artifacts: [plan.md]
        description: "收敛 — 引擎合并 frontmatter → plan_decisions.yaml，LLM 仅写 plan.md 主体"

      - ref: PLAN_APPROVE
        type: manual_checkpoint
        deps: [P3_converge]
        retry: 0
        auto_approve: false
        prompt: "Plan 已完成。请确认是否进入 Do 阶段？输入 'y' 确认，'n' 驳回重做。"

    transitions:
      - event: design_approved
        target: __exit__
        max_loops: 1
        desc: "Plan 获批 — 进入 Do 阶段"

      - event: design_flaw
        target: plan.P1_design
        reset: [plan.P1_design, plan.P1_merge_engine, plan.P1_density, plan.P2_review, plan.P2_adversary, plan.P3_converge, plan.PLAN_APPROVE]
        max_loops: 2
        desc: "设计缺陷 — 回滚到 P1 重新设计"

  # ================================================================
  # Do — N 实现 + M 审查 + 修复门
  # ================================================================
  do:
    entry_gate:
      artifacts: [plan.md]
      on_fail: block

    nodes:
      - ref: D0_prepare
        type: engine_exec
        command: pdf-engine.py context bundle
        deps: []
        retry: 2
        description: "上下文准备"

      - ref: D1_doer
        type: llm_spawn
        spawn_role: doer
        deps: [D0_prepare]
        retry: 3
        artifacts: [do_output_*.md]
        description: "实现 — spawn N doer（N 由 plan 决定）"


      - ref: D2_review
        type: llm_spawn
        spawn_role: reviewer
        deps: [D1_doer]
        retry: 3
        artifacts: [review_do_*.md]
        description: "实现审查 — spawn M reviewer，每 section 独立审查（每维度 1 人）"

      - ref: D3_fix
        type: repair_gate
        deps: [D2_review]
        retry: 3
        artifacts: [repair_decisions.yaml]
        description: "修复门 — 按 P1 类型路由修复/回滚，集成对抗审查机制"

    transitions:
      - event: done
        target: __exit__
        max_loops: 1
        desc: "Do 完成 — 进入 Check 阶段"

      - event: design_flaw_detected
        target: plan
        reset: [plan.P1_design, plan.P1_merge_engine, plan.P1_density, plan.P2_review, plan.P2_adversary, plan.P3_converge, plan.PLAN_APPROVE]
        max_loops: 2
        desc: "审查发现设计缺陷 — 回滚到 Plan"

      - event: bug
        target: do.D1_doer
        reset: [do.D1_doer, do.D2_review, do.D3_fix]
        max_loops: 3
        desc: "实现 bug — 回滚到 D1 重新实现"

  # ================================================================
  # Check — N 校验 + M 复核 + 修复门 + 对抗
  # ================================================================
  check:
    entry_gate:
      artifacts: [do_output_*.md]
      on_fail: block

    nodes:
      - ref: C1_check
        type: llm_spawn
        spawn_role: checker
        deps: []
        retry: 3
        artifacts: [check_report_*.md]
        description: "校验 — N 个 checker 各自审查对应 section，+1 global checker 跨切面审查"

      - ref: C2_repair_gate
        type: repair_gate
        deps: [C1_check]
        retry: 2
        artifacts: [repair_decisions.yaml]
        description: "修复门 — 四路路由（clean/bug/design_flaw/flaky_test）"

    transitions:
      - event: clean
        target: __exit__
        max_loops: 1
        desc: "全部通过 — 进入 Act"

      - event: bug
        target: do
        reset: [do.*]
        max_loops: 3
        desc: "P1 bug — 回滚到 Do 阶段"

      - event: design_flaw
        target: plan
        reset: [plan.P1_design, plan.P1_merge_engine, plan.P1_density, plan.P2_review, plan.P2_adversary, plan.P3_converge, plan.PLAN_APPROVE]
        max_loops: 2
        desc: "设计缺陷 — 回滚到 Plan 阶段"

  # ================================================================
  # Act — 标准化 + 技术栈经验沉淀
  # ================================================================
  act:
    entry_gate:
      artifacts: [check_report_*.md]
      on_fail: warn

    nodes:
      - ref: A0_converge
        type: engine_exec
        command: pdf-engine.py converge
        deps: []
        retry: 2
        description: "引擎合并所有 section → merged.md"

      - ref: A1_standardize
        type: llm_converge
        deps: [A0_converge]
        retry: 3
        artifacts: [act_report.md]
        description: "标准化 — 各 section 自检报告汇总，引擎聚合为表格，LLM 仅写合成部分"

      - ref: A2_evolve
        type: engine_exec
        command: pdf-engine.py knowledge append-ts
        deps: [A1_standardize]
        retry: 2
        description: "技术栈经验沉淀"

      - ref: A3_persist_factor
        type: engine_exec
        command: pdf-engine.py knowledge persist-factors
        deps: [A2_evolve]
        retry: 2
        description: "因子持久化 — 将本轮的 factor_analysis.md + triggered_factors 写入 cycle-log DB 因子知识库"

      - ref: A4_scan_promotion
        type: engine_exec
        command: pdf-engine.py knowledge scan-promotion
        deps: [A3_persist_factor]
        retry: 2
        artifacts: [factor_promotion_proposal.yaml]
        description: "跨 cycle 扫描 — 查询 cycle-log 中同一因子 >=3 次出现，生成 factor_promotion_proposal.yaml"

    transitions:
      - event: done
        target: __final__
        max_loops: 1
        desc: "Act 完成 — cycle 结束"
