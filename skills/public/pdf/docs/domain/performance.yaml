# performance.yaml — Domain knowledge for performance-related tasks
name: performance
version: 1

classification:
  priority: 4
  keywords:
    - latency
    - throughput
    - cache
    - query
    - N+1
    - 延迟
    - 吞吐
    - 缓存
    - 查询
    - 性能
    - 慢查询
    - 索引
    - 并发
    - 热路径
    - 基准

analysis:
  default_n: 1
  n_override: []
  skip_when: [config, docs, bugfix]
  skip_plan_only_when: [audit, report]

  partitions:
    - name: general
      focus:
        - "延迟预算与吞吐量基准分析"
        - "常见性能反模式识别（N+1、无界循环、缺失索引）"
        - "缓存策略评估与命中率预估"
        - "资源瓶颈预判（连接池、内存分配、IO）"
      output: analysis_general.md

external_intel:
  search_queries:
    - "{topic} 性能优化 延迟预算 吞吐量基准 {year}"
    - "{topic} 常见性能陷阱 反模式 缓存策略"
  kb_hint: "性能领域：关注延迟基准、缓存策略、常见陷阱。"
  max_searches: 3

design_templates:
  architecture: "问题背景→性能目标→架构原则→分层设计→数据流→缓存策略→部署拓扑→监控方案"
  feature: "用户场景→验收标准→设计方案→性能边界→缓存策略→测试策略→上线计划"
  refactor: "现状分析→性能瓶颈→重构策略→兼容性→基准对比→回滚方案"
  bugfix: "根因分析→修复方案→性能回归测试→影响范围→预防措施"
  audit/report: "评估范围→性能基线→瓶颈分析→风险排序→优化建议→行动计划"

review_extensions:
  - dimension: performance
    extra_checks:
      - "是否有基准测试验证延迟/吞吐改进"
      - "缓存失效策略是否在边界条件下正确"

# === v2: Model Tier Overrides ===
# Performance optimization is nuanced — hot-path analysis needs stronger models
model_tier_overrides:
  do:
    p1: sonnet
  check:
    p2: sonnet

evolution:
  last_updated: 2026-06-03
  cycles_contributed: 0
  promoted_findings: []
