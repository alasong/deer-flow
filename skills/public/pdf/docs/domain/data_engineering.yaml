# data_engineering.yaml — Domain knowledge for data engineering tasks
name: data_engineering
version: 1

classification:
  priority: 2
  keywords:
    - pipeline
    - ETL
    - schema
    - migration
    - data
    - 数据
    - 管道
    - 迁移
    - 血缘
    - 数据质量
    - 数据治理
    - 数仓
    - 数据湖

analysis:
  default_n: 1
  n_override: []
  skip_when: [config, docs, bugfix]
  skip_plan_only_when: [audit, report]

  partitions:
    - name: general
      focus:
        - "数据质量与一致性约束分析"
        - "Schema 演进策略与向后兼容性"
        - "数据血缘追踪与影响分析"
        - "管道故障模式与数据丢失风险评估"
      output: analysis_general.md

external_intel:
  search_queries:
    - "{topic} 数据管道最佳实践 ETL 数据质量 {year}"
    - "{topic} 数据血缘追踪 schema演进 数据治理"
  kb_hint: "数据工程领域：关注数据质量、血缘追踪、schema演进策略。"
  max_searches: 3

design_templates:
  architecture: "问题背景→数据流→架构原则→管道设计→Schema契约→监控告警→部署→路线图"
  feature: "用户场景→验收标准→管道设计→数据质量→边界条件→测试策略→上线计划"
  refactor: "现状分析→数据流重构→分步策略→兼容性→风险评估→回滚方案"
  bugfix: "根因分析→修复方案→数据验证→影响范围→预防措施"
  audit/report: "评估范围→数据基线→质量分析→风险排序→建议→行动计划"

review_extensions:
  - dimension: reliability
    extra_checks:
      - "管道是否有幂等性保证和断点续传"
      - "数据丢失/重复是否有检测机制"

# === v2: Model Tier Overrides ===
# Data pipelines process critical data flows — correctness demands stronger models
model_tier_overrides:
  do:
    p1: sonnet
    p2:
      correctness: sonnet
      default: haiku

evolution:
  last_updated: 2026-06-03
  cycles_contributed: 0
  promoted_findings: []
