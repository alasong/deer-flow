# api_design.yaml — Domain knowledge for API design tasks
name: api_design
version: 1

classification:
  priority: 3
  keywords:
    - api
    - endpoint
    - route
    - REST
    - GraphQL
    - gRPC
    - SDK
    - RPC
    - schema
    - 接口
    - 端点
    - 路由

analysis:
  default_n: 1
  n_override: []
  skip_when: [config, docs, bugfix]
  skip_plan_only_when: [audit, report]

  partitions:
    - name: general
      focus:
        - "API 版本策略与向后兼容性分析"
        - "接口命名一致性和错误格式标准化"
        - "分页、排序、过滤模式的统一性"
        - "Breaking change 影响范围评估"
      output: analysis_general.md

external_intel:
  search_queries:
    - "{topic} API设计最佳实践 REST GraphQL gRPC {year}"
    - "{topic} API版本策略 向后兼容 breaking changes"
    - "{topic} API安全 OWASP API Top 10 鉴权"
  kb_hint: "API设计领域：关注版本策略、向后兼容、命名约定。"
  max_searches: 3

design_templates:
  architecture: "问题背景→威胁/约束→架构原则→分层设计→模块契约→数据流→部署→路线图"
  feature: "用户场景→验收标准→设计方案→边界条件→测试策略→上线计划"
  refactor: "现状分析→重构目标→分步策略→兼容性→风险评估→回滚方案"
  bugfix: "根因分析→修复方案→回归测试→影响范围→预防措施"
  audit/report: "评估范围→对比基线→差距分析→风险排序→建议→行动计划"

review_extensions:
  - dimension: api_design
    extra_checks:
      - "是否有 OpenAPI/GraphQL schema 变更且向后兼容"
      - "错误响应格式是否与项目约定一致"

# === v2: Model Tier Overrides ===
# API design affects external consumers — interfaces and contracts need stronger models
model_tier_overrides:
  plan:
    analysis: sonnet
  do:
    p1: sonnet
    p2:
      api_design: sonnet
      correctness: sonnet
      default: haiku

evolution:
  last_updated: 2026-06-03
  cycles_contributed: 0
  promoted_findings: []
